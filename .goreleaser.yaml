version: 2

project_name: ob

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ob
    binary: ob
    ldflags:
      - -s -w -X github.com/openbindings/ob/internal/app.OBVersion={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: openbindings
      name: homebrew-tap
    name: ob
    homepage: https://openbindings.com
    description: The OpenBindings CLI
    license: Apache-2.0
    install: |
      bin.install "ob"
    test: |
      system "#{bin}/ob", "version"

release:
  github:
    owner: openbindings
    name: ob
  draft: false
  prerelease: auto
